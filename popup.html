<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auto Website Muter</title>
    <style>
      :root {
        color-scheme: light;
        --primary: #007bff;
        --primary-dark: #0069d9;
        --success: #28a745;
        --success-dark: #218838;
        --danger: #dc3545;
        --danger-dark: #bd2130;
        --ink: #18212f;
        --muted-ink: #667085;
        --surface: #ffffff;
        --canvas: #f4f7fb;
        --line: #dfe5ed;
        --focus: rgba(0, 123, 255, 0.26);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 260px;
        margin: 0;
      }

      body {
        min-height: 250px;
        overflow-x: hidden;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(0, 123, 255, 0.06), transparent 42%),
          var(--canvas);
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
        font-size: 13px;
        line-height: 1.4;
      }

      main {
        padding: 18px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 11px;
        margin-bottom: 16px;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
        flex: 0 0 auto;
        object-fit: contain;
        filter: drop-shadow(0 6px 9px rgba(24, 33, 47, 0.18));
      }

      .eyebrow {
        margin: 0 0 1px;
        color: var(--primary);
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 750;
        letter-spacing: -0.025em;
      }

      button {
        font: inherit;
      }

      #toggle-button {
        width: 100%;
        min-height: 43px;
        padding: 10px 14px;
        border: 0;
        border-radius: 10px;
        color: #ffffff;
        background: var(--primary);
        box-shadow: 0 6px 13px rgba(0, 123, 255, 0.2);
        cursor: pointer;
        font-size: 12px;
        font-weight: 750;
        letter-spacing: 0.01em;
        transition:
          background-color 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      #toggle-button:hover:not(:disabled) {
        background: var(--primary-dark);
        box-shadow: 0 8px 16px rgba(0, 123, 255, 0.28);
        transform: translateY(-1px);
      }

      #toggle-button:active:not(:disabled) {
        transform: translateY(0);
      }

      #toggle-button.is-unmute {
        background: var(--success);
        box-shadow: 0 6px 13px rgba(40, 167, 69, 0.2);
      }

      #toggle-button.is-unmute:hover:not(:disabled) {
        background: var(--success-dark);
        box-shadow: 0 8px 16px rgba(40, 167, 69, 0.28);
      }

      #toggle-button:disabled {
        color: #8a94a3;
        background: #e3e8ef;
        box-shadow: none;
        cursor: not-allowed;
      }

      button:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 2px;
      }

      #status {
        min-height: 18px;
        margin: 7px 2px 0;
        color: var(--muted-ink);
        font-size: 10px;
      }

      .list-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 14px;
        padding-top: 13px;
        border-top: 1px solid var(--line);
      }

      h2 {
        margin: 0;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      #domain-count {
        min-width: 21px;
        padding: 2px 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted-ink);
        background: var(--surface);
        text-align: center;
        font-size: 10px;
        font-weight: 700;
      }

      #empty-state {
        margin: 18px 8px 8px;
        color: var(--muted-ink);
        text-align: center;
        font-size: 11px;
      }

      #domain-list {
        max-height: 164px;
        margin: 9px -4px 0;
        padding: 0 4px;
        overflow-y: auto;
        list-style: none;
        scrollbar-width: thin;
        scrollbar-color: #c3cbd7 transparent;
      }

      #domain-list li {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 38px;
        margin-bottom: 6px;
        padding: 6px 7px 6px 10px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: var(--surface);
        box-shadow: 0 2px 5px rgba(24, 33, 47, 0.04);
      }

      .domain-name {
        min-width: 0;
        flex: 1;
        overflow: hidden;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: 10px;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .remove-button {
        display: grid;
        width: 25px;
        height: 25px;
        flex: 0 0 auto;
        padding: 0;
        place-items: center;
        border: 0;
        border-radius: 7px;
        color: #ffffff;
        background: var(--danger);
        cursor: pointer;
        font-size: 15px;
        font-weight: 500;
        line-height: 1;
        transition:
          background-color 160ms ease,
          transform 160ms ease;
      }

      .remove-button:hover:not(:disabled) {
        background: var(--danger-dark);
        transform: scale(1.06);
      }

      .remove-button:disabled {
        cursor: wait;
        opacity: 0.55;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <img class="brand-mark" src="assets/icons/icon48.png" alt="">
        <div>
          <p class="eyebrow">Tab audio control</p>
          <h1>Auto Website Muter</h1>
        </div>
      </header>

      <button id="toggle-button" type="button" disabled>Checking this page…</button>
      <p id="status" role="status" aria-live="polite"></p>

      <section aria-labelledby="domain-list-title">
        <div class="list-heading">
          <h2 id="domain-list-title">Muted domains</h2>
          <span id="domain-count" aria-label="0 muted domains">0</span>
        </div>
        <p id="empty-state">No muted websites yet.</p>
        <ul id="domain-list"></ul>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
