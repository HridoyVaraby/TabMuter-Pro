name: Feature request
description: Suggest an improvement that fits the extension's single purpose.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What website-audio problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Explain the behavior you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope checklist
      options:
        - label: This request supports automatic website audio muting.
          required: true
        - label: I searched existing issues for a similar request.
          required: true
