name: Bug report
description: Report reproducible incorrect extension behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve Auto Website Muter. Do not include private browsing data.
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: chrome-version
    attributes:
      label: Chrome version and operating system
      placeholder: Chrome version, Windows/macOS/Linux version
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe what happened without including sensitive URLs or browsing information.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open a test website
        2. Select the extension action
        3. Select Mute This Website
        4. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Relevant diagnostics
      description: Add sanitized console output or screenshots if useful.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed private browsing data from this report.
          required: true
